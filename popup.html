<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoidTube</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <div class="header-main">
        <div class="logo">
          <div class="logo-icon"></div>
          <div class="logo-text">
            <h1>VoidTube</h1>
            <p class="subtitle">Focus is your power.</p>
          </div>
        </div>
        <div class="master-switch-container">
          <label class="master-switch">
            <input type="checkbox" id="masterSwitch" checked>
            <span class="master-slider"></span>
          </label>
        </div>
      </div>
    </header>

    <main id="settingsList">
      <div class="section-label">BLOCK ELEMENTS</div>

      <div class="toggle-group">
        <div class="toggle-item">
          <div class="text">
            <h3>Home Feed</h3>
            <p>Hide the central recommendation wall</p>
          </div>
          <label class="switch">
            <input type="checkbox" id="blockHome" checked>
            <span class="slider"></span>
          </label>
        </div>

        <div class="toggle-item">
          <div class="text">
            <h3>Sidebar</h3>
            <p>Hide "Up next" & related videos</p>
          </div>
          <label class="switch">
            <input type="checkbox" id="blockSidebar" checked>
            <span class="slider"></span>
          </label>
        </div>

        <div class="toggle-item">
          <div class="text">
            <h3>Comments</h3>
            <p>Hide the entire comment section</p>
          </div>
          <label class="switch">
            <input type="checkbox" id="blockComments">
            <span class="slider"></span>
          </label>
        </div>

        <div class="toggle-item">
          <div class="text">
            <h3>Shorts</h3>
            <p>Hide Shorts shelves & navigation</p>
          </div>
          <label class="switch">
            <input type="checkbox" id="blockShorts" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-status" id="statusText">Protection Active</div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>

</html>
